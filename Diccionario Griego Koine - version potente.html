<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diccionario Griego Koiné</title>
<style>
/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  color-scheme: light;
  --bg:        #fff7ea;
  --surface:   #fffdf8;
  --surface2:  #f4ebdd;
  --border:    #eadbc7;
  --border2:   #d9bfa3;
  --azul:      #4f72da;
  --azul-lt:   #3c60c8;
  --verde:     #20b986;
  --morado:    #8f73df;
  --ambar:     #efa73a;
  --rosa:      #e66d9f;
  --teal:      #25a99b;
  --gris:      #7a6f64;
  --blanco:    #1f2a35;
  --texto:     #3f4852;
  --muted-soft:#8b8175;
  --hero-bg:   radial-gradient(circle at 9% 18%, rgba(61,215,165,0.42), transparent 18rem),
                radial-gradient(circle at 74% 2%, rgba(255,198,77,0.40), transparent 20rem),
                radial-gradient(circle at 98% 64%, rgba(255,114,154,0.20), transparent 21rem),
                linear-gradient(135deg, #fff7e8 0%, #eef8e9 45%, #fff3e1 100%);
  --panel-bg:  rgba(255,253,248,0.88);
  --focus:     rgba(71,120,214,0.18);
  --greek-font: 'Noto Serif', 'Palatino Linotype', 'Book Antiqua', Palatino, 'Times New Roman', serif;
  --ui-font:   Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --radius:    24px;
  --radius-sm: 12px;
  --shadow:    0 18px 50px rgba(84,64,39,0.14);
}

body[data-theme="dark"] {
  color-scheme: dark;
  --bg:        #11151b;
  --surface:   #1a2029;
  --surface2:  #242c38;
  --border:    #303948;
  --border2:   #465263;
  --azul:      #6fa1ff;
  --azul-lt:   #9bbdff;
  --verde:     #69dba4;
  --morado:    #b9a3ff;
  --ambar:     #f5b84b;
  --rosa:      #f58fbd;
  --teal:      #5ad8cb;
  --gris:      #9ba7b6;
  --blanco:    #f1f5f9;
  --texto:     #d8dee7;
  --muted-soft:#9ba7b6;
  --hero-bg:   radial-gradient(circle at 9% 18%, rgba(61,215,165,0.18), transparent 20rem),
                radial-gradient(circle at 74% 2%, rgba(245,184,75,0.16), transparent 22rem),
                radial-gradient(circle at 98% 64%, rgba(245,143,189,0.14), transparent 21rem),
                linear-gradient(135deg, #101722 0%, #151d29 50%, #102319 100%);
  --panel-bg:  rgba(26,32,41,0.88);
  --focus:     rgba(111,161,255,0.18);
  --shadow:    0 18px 50px rgba(0,0,0,0.34);
}

body {
  font-family: var(--ui-font);
  background: var(--bg);
  color: var(--texto);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  letter-spacing: 0;
}

/* ── Header ── */
header {
  background: var(--hero-bg);
  border-bottom: 1px solid var(--border);
  padding: 24px 24px 22px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
  overflow: hidden;
}

header::before,
header::after {
  content: '';
  position: absolute;
  border-radius: 999px;
  pointer-events: none;
  z-index: -1;
}
header::before {
  width: 220px;
  height: 220px;
  right: 8%;
  top: -104px;
  background: rgba(79,114,218,0.13);
}
header::after {
  width: 160px;
  height: 160px;
  right: 25%;
  bottom: -92px;
  background: rgba(245,143,189,0.16);
}

.header-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.logo-icon {
  font-size: 30px;
  font-family: var(--greek-font);
  color: var(--azul-lt);
  background: linear-gradient(160deg, #fff 0%, #f8f0e5 100%);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 10px 28px rgba(56,44,29,0.12);
}

.header-title h1 {
  font-size: 25px;
  font-weight: 800;
  color: var(--blanco);
  letter-spacing: 0;
}
.header-title p {
  font-size: 12.5px;
  color: var(--gris);
  margin-top: 3px;
}

/* ── Buscador ── */
.search-wrap {
  position: relative;
  margin-top: 16px;
}

.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gris);
  font-size: 20px;
  pointer-events: none;
  z-index: 2;
}

#searchInput {
  width: 100%;
  background: var(--panel-bg);
  border: 1.5px solid var(--border2);
  border-radius: 999px;
  padding: 15px 96px 15px 48px;
  font-size: 17px;
  color: var(--blanco);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  font-family: var(--greek-font);
}
#searchInput:focus {
  border-color: var(--azul);
  box-shadow: 0 0 0 4px var(--focus);
}
#searchInput::placeholder { color: var(--gris); font-family: var(--ui-font); }

.clear-btn {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--gris);
  cursor: pointer;
  font-size: 17px;
  padding: 4px;
  border-radius: 4px;
  display: none;
  line-height: 1;
}
.clear-btn:hover { color: var(--blanco); }
.clear-btn.visible { display: flex; align-items: center; }

.greek-key-btn {
  position: absolute;
  right: 48px;
  top: 50%;
  transform: translateY(-50%);
  border: 1px solid var(--border2);
  background: rgba(74,143,232,0.1);
  color: var(--azul-lt);
  cursor: pointer;
  font: 700 12px var(--greek-font);
  height: 34px;
  min-width: 44px;
  border-radius: 999px;
  line-height: 1;
}
.greek-key-btn:hover { border-color: var(--azul); color: #fff; }
.greek-key-btn.active {
  background: var(--azul);
  border-color: var(--azul);
  color: #fff;
  box-shadow: 0 0 0 3px rgba(74,143,232,0.15);
}

/* ── Tabs de filtro ── */
.tabs-wrap {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 16px;
}

.tab {
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 8px 16px;
  font-size: 11.5px;
  font-weight: 700;
  cursor: pointer;
  color: var(--gris);
  transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 0.3px;
}
.tab:hover { border-color: var(--border2); color: var(--blanco); }
.tab.active { color: #fff; border-color: transparent; }

.tab[data-cat="ALL"]  { border-color: var(--border2); }
.tab[data-cat="ALL"].active  { background: linear-gradient(135deg, var(--azul), #6f8ef0); }
.tab[data-cat="VB"].active   { background: linear-gradient(135deg, var(--verde), #7ce3b7); color: #052e16; }
.tab[data-cat="MSN"].active  { background: linear-gradient(135deg, var(--azul), #85a5ff); }
.tab[data-cat="FSN"].active  { background: linear-gradient(135deg, var(--morado), #c4b5fd); }
.tab[data-cat="NSN"].active  { background: linear-gradient(135deg, var(--ambar), #ffd166); color: #1c1400; }
.tab[data-cat="ADJ"].active  { background: linear-gradient(135deg, var(--teal), #7ee8df); color: #042f2e; }
.tab[data-cat="PREP"].active { background: linear-gradient(135deg, #2dd4bf, #8cf5e6); color: #042f2e; }
.tab[data-cat="PRON"].active { background: linear-gradient(135deg, var(--rosa), #ffb1d2); color: #4a0020; }
.tab[data-cat="OTRO"].active { background: var(--gris); color: #111; }

/* ── Stats bar ── */
.stats-bar {
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11.5px;
  color: var(--gris);
}
.stats-bar b { color: var(--azul-lt); }

/* Modo selector */
.mode-btns {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.mode-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 7px 13px;
  font-size: 11.5px;
  cursor: pointer;
  color: var(--gris);
  transition: all 0.15s;
}
.mode-btn:hover { color: var(--blanco); }
.mode-btn.active { background: var(--azul); border-color: var(--azul); color: #fff; }
.theme-toggle {
  display: inline-flex;
  gap: 4px;
  padding: 3px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--surface2);
}
.theme-toggle .mode-btn {
  border: 0;
  background: transparent;
  padding: 4px 9px;
}
.theme-toggle .mode-btn.active {
  background: var(--azul);
  color: #fff;
}

/* ── Main layout ── */
main {
  flex: 1;
  padding: 16px 16px 32px;
  max-width: 1160px;
  margin: 0 auto;
  width: 100%;
}

/* ── Autocomplete dropdown ── */
#autocomplete {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  max-height: 280px;
  overflow-y: auto;
  z-index: 200;
  display: none;
}
#autocomplete.open { display: block; }

.ac-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.selected { background: var(--surface2); }

.ac-greek {
  font-family: var(--greek-font);
  font-size: 15px;
  font-weight: 700;
  color: var(--azul-lt);
  min-width: 110px;
}
.ac-translit {
  font-size: 11px;
  color: var(--gris);
  font-style: italic;
  min-width: 90px;
}
.ac-es {
  font-size: 12px;
  color: var(--texto);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.ac-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
  flex-shrink: 0;
}

/* ── Lista de resultados ── */
#resultsList {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
  margin-top: 4px;
}

.entry-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 18px 18px 16px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
}
.entry-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 6px;
}
.entry-card:hover {
  border-color: var(--border2);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 5px;
}

.card-greek {
  font-family: var(--greek-font);
  font-size: 24px;
  font-weight: 700;
  color: var(--blanco);
  line-height: 1.2;
}

.card-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 3px 7px;
  border-radius: 999px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
  letter-spacing: 0.4px;
}

.card-translit {
  font-size: 11px;
  color: var(--gris);
  font-style: italic;
  margin-bottom: 6px;
}

.card-morpho {
  font-size: 10.5px;
  color: var(--gris);
  margin-bottom: 5px;
  font-family: var(--ui-font);
}

.card-meaning {
  font-size: 14px;
  color: var(--texto);
  font-weight: 500;
  line-height: 1.4;
}

/* colores por categoría */
.cat-VB  .entry-card::before, .cat-VB  .card-badge { background: var(--verde); }
.cat-VB  .card-badge { color: #052e16; }
.cat-VB  .card-greek { color: #6ee7b7; }

.cat-MSN .entry-card::before, .cat-MSN .card-badge { background: var(--azul); }
.cat-MSN .card-badge { color: #fff; }
.cat-MSN .card-greek { color: var(--azul-lt); }

.cat-FSN .entry-card::before, .cat-FSN .card-badge { background: var(--morado); }
.cat-FSN .card-badge { color: #fff; }
.cat-FSN .card-greek { color: #c4b5fd; }

.cat-NSN .entry-card::before, .cat-NSN .card-badge { background: var(--ambar); }
.cat-NSN .card-badge { color: #1c1400; }
.cat-NSN .card-greek { color: #fcd34d; }

.cat-ADJ .entry-card::before, .cat-ADJ .card-badge { background: var(--teal); }
.cat-ADJ .card-badge { color: #042f2e; }
.cat-ADJ .card-greek { color: #5eead4; }

.cat-PREP .entry-card::before, .cat-PREP .card-badge { background: var(--teal); }
.cat-PREP .card-badge { color: #042f2e; }
.cat-PREP .card-greek { color: #5eead4; }

.cat-PRON .entry-card::before, .cat-PRON .card-badge { background: var(--rosa); }
.cat-PRON .card-badge { color: #4a0020; }
.cat-PRON .card-greek { color: #f9a8d4; }

.cat-OTRO .entry-card::before, .cat-OTRO .card-badge { background: var(--gris); }
.cat-OTRO .card-badge { color: #111; }

/* ── Letras separadoras ── */
.letra-sep {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 8px 0 2px;
}
.letra-sep span {
  font-family: var(--greek-font);
  font-size: 22px;
  font-weight: 700;
  color: var(--azul);
  background: rgba(74,143,232,0.1);
  border: 1px solid rgba(74,143,232,0.2);
  border-radius: 16px;
  width: 46px;
  height: 46px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.letra-sep hr {
  flex: 1;
  border: none;
  border-top: 1px solid var(--border);
}
.letra-sep small {
  font-size: 10px;
  color: var(--gris);
  white-space: nowrap;
}

/* ── Modo tarjetas ── */
#flashcard-wrap {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 40px;
}
#flashcard-wrap.active { display: flex; }
#resultsList.hidden { display: none; }

.fc-progress {
  width: 100%;
  max-width: 500px;
  margin-bottom: 16px;
}
.fc-bar-bg {
  background: var(--surface2);
  border-radius: 10px;
  height: 6px;
  overflow: hidden;
  margin-bottom: 6px;
}
.fc-bar {
  background: linear-gradient(90deg, var(--azul), var(--verde));
  height: 100%;
  border-radius: 10px;
  transition: width 0.3s;
}
.fc-label {
  font-size: 11px;
  color: var(--gris);
  text-align: center;
}

.flashcard {
  width: 100%;
  max-width: 500px;
  min-height: 200px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 28px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: var(--shadow);
  text-align: center;
  perspective: 1000px;
  position: relative;
}
.flashcard:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }

.fc-front, .fc-back {
  width: 100%;
}
.fc-back { display: none; }
.flashcard.flipped .fc-front { display: none; }
.flashcard.flipped .fc-back  { display: block; }

.fc-greek {
  font-family: var(--greek-font);
  font-size: 42px;
  font-weight: 700;
  color: var(--blanco);
  margin-bottom: 8px;
  line-height: 1.2;
}
.fc-translit {
  font-size: 15px;
  color: var(--gris);
  font-style: italic;
  margin-bottom: 6px;
}
.fc-hint {
  font-size: 12px;
  color: var(--border2);
  margin-top: 16px;
}
.fc-meaning {
  font-size: 22px;
  font-weight: 600;
  color: var(--verde);
  margin-bottom: 10px;
}
.fc-cod { font-size: 12px; color: var(--gris); margin-bottom: 6px; }
.fc-letra-badge {
  position: absolute;
  top: 12px;
  right: 14px;
  font-family: var(--greek-font);
  font-size: 12px;
  color: var(--gris);
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 2px 7px;
}

.fc-controls {
  display: flex;
  gap: 12px;
  margin-top: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.fc-btn {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 10px 22px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: var(--blanco);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.fc-btn:hover { background: var(--surface2); }
.fc-btn.primary { background: var(--azul); border-color: var(--azul); }
.fc-btn.primary:hover { opacity: 0.85; }
.fc-btn.success { background: var(--verde); border-color: var(--verde); color: #052e16; }
.fc-btn.danger  { background: #dc2626; border-color: #dc2626; }

.fc-stats {
  display: flex;
  gap: 16px;
  margin-top: 14px;
  font-size: 12px;
}
.fc-stat { text-align: center; }
.fc-stat b { display: block; font-size: 18px; }
.fc-stat.ok b { color: var(--verde); }
.fc-stat.fail b { color: #f87171; }
.fc-stat.pend b { color: var(--ambar); }

/* ── Modal detalle ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  max-width: 480px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  animation: slideUp 0.2s ease;
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.modal-header {
  padding: 20px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.modal-greek {
  font-family: var(--greek-font);
  font-size: 36px;
  font-weight: 700;
  line-height: 1.2;
}

.modal-close {
  background: var(--surface2);
  border: none;
  border-radius: var(--radius-sm);
  color: var(--gris);
  font-size: 18px;
  width: 32px;
  height: 32px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: color 0.15s;
}
.modal-close:hover { color: var(--blanco); }

.modal-body {
  padding: 16px 20px 20px;
}

.modal-row {
  display: flex;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.modal-row:last-child { border-bottom: none; }

.modal-label {
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--gris);
  min-width: 90px;
  padding-top: 1px;
}
.modal-value {
  font-size: 13.5px;
  color: var(--blanco);
  flex: 1;
  line-height: 1.5;
}
.modal-value.greek-val {
  font-family: var(--greek-font);
  font-size: 15px;
  color: var(--azul-lt);
}
.modal-value.meaning-val {
  font-weight: 600;
  color: var(--verde);
  font-size: 15px;
}


/* -- Panel potente -- */
.power-panel {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px 16px;
  display: grid;
  gap: 10px;
}
.tool-row, .letter-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.tool-btn, .tool-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 999px;
  min-height: 42px;
  color: var(--texto);
  font: 600 12px var(--ui-font);
}
.tool-btn {
  padding: 8px 14px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.tool-btn:hover, .tool-select:hover { border-color: var(--border2); color: var(--blanco); }
.tool-btn.active { border-color: var(--azul); color: #fff; background: rgba(74,143,232,0.22); }
.tool-btn.success.active { border-color: var(--verde); background: rgba(62,207,126,0.18); color: #8ff0bf; }
.tool-select { padding: 6px 28px 6px 10px; outline: none; }
.letter-chip {
  width: 38px;
  height: 38px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--gris);
  font: 700 14px var(--greek-font);
  cursor: pointer;
}
.letter-chip:hover { color: var(--blanco); border-color: var(--border2); }
.letter-chip.active { background: var(--azul); border-color: var(--azul); color: #fff; }
.card-actions {
  position: absolute;
  right: 10px;
  bottom: 8px;
  display: flex;
  gap: 6px;
}
.mini-action {
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--gris);
  border-radius: 999px;
  width: 26px;
  height: 26px;
  cursor: pointer;
  font-size: 13px;
}
.mini-action.active { color: #fff; border-color: var(--azul); background: rgba(74,143,232,0.28); }
.entry-card.known { opacity: 0.74; }
.entry-card.known .card-greek::after {
  content: ' aprendido';
  font: 700 10px var(--ui-font);
  color: var(--verde);
  margin-left: 8px;
}
.score-note {
  margin-top: 8px;
  font-size: 11px;
  color: var(--gris);
}
.modal-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding: 0 20px 20px;
}
.modal-actions .tool-btn { flex: 1 1 130px; justify-content: center; }
@media (max-width: 600px) {
  .stats-bar { align-items: flex-start; gap: 8px; flex-direction: column; }
  .header-top { align-items: flex-start; }
  .power-panel { padding: 10px 16px; }
  .tool-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .tool-btn, .tool-select { width: 100%; justify-content: center; }
  .letter-row { gap: 6px; }
  .letter-chip { width: 28px; height: 28px; }
  .card-actions { position: static; margin-top: 10px; }
}

/* ── Estado vacío ── */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--gris);
}
.empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
.empty-state h3 { font-size: 16px; color: var(--texto); margin-bottom: 6px; }
.empty-state p { font-size: 13px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Responsive ── */
@media (max-width: 600px) {
  header { padding: 14px 16px 12px; }
  #resultsList { grid-template-columns: 1fr; }
  .fc-greek { font-size: 32px; }
  .modal-greek { font-size: 28px; }
}
</style>

    <div class="logo-icon">α</div>

    <div id="autocomplete"></div>
  </div>

    <button class="tab" data-cat="MSN">MSN Masc.</button>
    <button class="tab" data-cat="FSN">FSN Fem.</button>
    <button class="tab" data-cat="NSN">NSN Neutro</button>
    <button class="tab" data-cat="ADJ">ADJ Adjetivo</button>
    <button class="tab" data-cat="PREP">PREP</button>
    <button class="tab" data-cat="PRON">PRON</button>
    <button class="tab" data-cat="OTRO">Otros</button>
  </div>
</header>

<div class="stats-bar">
  <span id="statsText">Mostrando <b id="countShown">636</b> de 636 entradas</span>
  <div class="mode-btns">
    <div class="theme-toggle" aria-label="Tema visual">
      <button class="mode-btn active" id="themeLight" type="button" onclick="setTheme('light')">Claro</button>
      <button class="mode-btn" id="themeDark" type="button" onclick="setTheme('dark')">Oscuro</button>
    </div>
    <button class="mode-btn active" id="btnLista" onclick="setMode('lista')">≡ Lista</button>
    <button class="mode-btn" id="btnFlash" onclick="setMode('flash')">⟳ Tarjetas</button>
  </div>
</div>

<section class="power-panel" aria-label="Herramientas">
  <div class="tool-row">
    <select class="tool-select" id="sortSelect" title="Ordenar">
      <option value="alpha">Orden alfabético</option>
      <option value="category">Por categoría</option>
      <option value="known">Aprendidas primero</option>
      <option value="review">Repaso primero</option>
      <option value="random">Aleatorio</option>
    </select>
    <button class="tool-btn" id="favToggle" title="Mostrar solo favoritas">☆ Favoritas</button>
    <button class="tool-btn success" id="pendingToggle" title="Ocultar aprendidas">◌ Pendientes</button>
    <button class="tool-btn" id="studyNowBtn" title="Estudiar resultados actuales">⟳ Estudiar</button>
    <button class="tool-btn" id="exportBtn" title="Exportar progreso">⇩ Progreso</button>
    <button class="tool-btn" id="resetBtn" title="Reiniciar progreso">↺ Reiniciar</button>
  </div>
  <div class="letter-row" id="letterRow" aria-label="Letras"></div>
</section>

<main>
  <div id="resultsList"></div>
  <div id="flashcard-wrap">
    <div class="fc-progress">
      <div class="fc-bar-bg"><div class="fc-bar" id="fcBar" style="width:0%"></div></div>
      <div class="fc-label" id="fcLabel">Carta 1 de 0</div>
    </div>
    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="fc-letra-badge" id="fcLetra"></div>
      <div class="fc-front">
        <div class="fc-greek" id="fcGreek"></div>
        <div class="fc-translit" id="fcTranslit"></div>
        <div class="fc-cod" id="fcCod"></div>
        <div class="fc-hint">toca para ver significado</div>
      </div>
      <div class="fc-back">
        <div class="fc-meaning" id="fcMeaning"></div>
        <div class="fc-cod" id="fcCodBack"></div>
      </div>
    </div>
    <div class="fc-controls">
      <button class="fc-btn danger" onclick="fcAnswer(false)">✗ No supe</button>
      <button class="fc-btn primary" onclick="flipCard()">↻ Girar</button>
      <button class="fc-btn success" onclick="fcAnswer(true)">✓ La supe</button>
    </div>
    <div class="fc-stats">
      <div class="fc-stat ok"><b id="fcOk">0</b>aprendidas</div>
      <div class="fc-stat fail"><b id="fcFail">0</b>repasar</div>
      <div class="fc-stat pend"><b id="fcPend">0</b>pendientes</div>
    </div>
  </div>
</main>

<!-- Modal detalle -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-greek" id="modalGreek"></div>
        <div style="font-size:12px;color:var(--gris);font-style:italic;margin-top:3px" id="modalTranslit"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button class="tool-btn" id="modalFavBtn" onclick="toggleFavorite(lastModalId)">☆ Favorita</button>
      <button class="tool-btn success" id="modalKnownBtn" onclick="toggleKnown(lastModalId)">✓ Aprendida</button>
      <button class="tool-btn" onclick="copyLemma(lastModalId)">⧉ Copiar</button>
    </div>
  </div>
</div>

// ── Helpers de categoría ──────────────────────────────────────
function getCat(cod) {
  const c = cod.toUpperCase();
  if (c.startsWith('VB')) return 'VB';
  if (c.startsWith('MSN')) return 'MSN';
  if (c.startsWith('FSN')) return 'FSN';
  if (c.startsWith('NSN')) return 'NSN';
  if (c.startsWith('ADJ')) return 'ADJ';
  if (c.startsWith('PREP')) return 'PREP';
  if (c.startsWith('PRON') || c.startsWith('ART')) return 'PRON';
  return 'OTRO';
}

function catLabel(cat) {
  return { VB:'Verbo', MSN:'Masc.', FSN:'Fem.', NSN:'Neutro',
           ADJ:'Adj.', PREP:'Prep.', PRON:'Pron.', OTRO:'Otro' }[cat] || cat;
}

function badgeStyle(cat) {
  const map = {
    VB:   'background:#3ecf7e;color:#052e16',
    MSN:  'background:#4a8fe8;color:#fff',
    FSN:  'background:#a78bfa;color:#fff',
    NSN:  'background:#f59e0b;color:#1c1400',
    ADJ:  'background:#2dd4bf;color:#042f2e',
    PREP: 'background:#2dd4bf;color:#042f2e',
    PRON: 'background:#f472b6;color:#4a0020',
    OTRO: 'background:#8892a4;color:#111',
  };
  return map[cat] || map.OTRO;
}

function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}

function entryKey(e) { return String(e.id); }
function entryState(e) { return studyState[entryKey(e)] || {}; }
function isKnown(e) { return !!entryState(e).known; }
function isFav(e) { return !!entryState(e).fav; }

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') || {}; }
  catch { return {}; }
}
function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(studyState));
}

function mutateEntry(id, patch) {
  const key = String(id);
  studyState[key] = { ...(studyState[key] || {}), ...patch, updatedAt: Date.now() };
  saveProgress();
}

function setTheme(theme) {
  const nextTheme = theme === 'dark' ? 'dark' : 'light';
  document.body.dataset.theme = nextTheme;
  localStorage.setItem(THEME_KEY, nextTheme);
  document.getElementById('themeLight')?.classList.toggle('active', nextTheme === 'light');
  document.getElementById('themeDark')?.classList.toggle('active', nextTheme === 'dark');
}

function initTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  setTheme(saved || (prefersDark ? 'dark' : 'light'));
}

// ── Normalizar texto ──────────────────────────────────────────
function normalize(str) {
  return String(str ?? '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/ς/g, 'σ')
    .toLowerCase()
    .trim();
}

function looseGreek(str) {
  return normalize(str)
    .replace(/[ηε]/g, 'ε')
    .replace(/[ωο]/g, 'ο')
    .replace(/[ιυ]/g, 'ι');
}

function toGreekKeyboard(text) {
  const digraphs = [
    ['th', 'θ'], ['ph', 'φ'], ['ch', 'χ'], ['ps', 'ψ'], ['ks', 'ξ'],
    ['rh', 'ῥ'], ['ou', 'ου'], ['ai', 'αι'], ['ei', 'ει'], ['oi', 'οι'],
    ['au', 'αυ'], ['eu', 'ευ'], ['ui', 'υι'], ['oo', 'ω'], ['ee', 'η']
  ];
  const letters = {
    a:'α', b:'β', c:'κ', d:'δ', e:'ε', f:'φ', g:'γ', h:'η',
    i:'ι', j:'ξ', k:'κ', l:'λ', m:'μ', n:'ν', o:'ο', p:'π',
    q:'θ', r:'ρ', s:'σ', t:'τ', u:'υ', v:'β', w:'ω', x:'χ',
    y:'υ', z:'ζ',
    A:'Α', B:'Β', C:'Κ', D:'Δ', E:'Ε', F:'Φ', G:'Γ', H:'Η',
    I:'Ι', J:'Ξ', K:'Κ', L:'Λ', M:'Μ', N:'Ν', O:'Ο', P:'Π',
    Q:'Θ', R:'Ρ', S:'Σ', T:'Τ', U:'Υ', V:'Β', W:'Ω', X:'Χ',
    Y:'Υ', Z:'Ζ',
    á:'ά', é:'έ', í:'ί', ó:'ό', ú:'ύ', Á:'Ά', É:'Έ', Í:'Ί', Ó:'Ό', Ú:'Ύ',
    ñ:'ν', Ñ:'Ν'
  };

  let out = '';
  for (let i = 0; i < text.length;) {
    const pair = text.slice(i, i + 2).toLowerCase();
    const hit = digraphs.find(([latin]) => latin === pair);
    if (hit) {
      out += text[i] === text[i].toUpperCase() ? hit[1].toUpperCase() : hit[1];
      i += 2;
      continue;
    }
    out += letters[text[i]] || text[i];
    i++;
  }
  return out
    .replace(/ς(?=[\u0370-\u03ff\u1f00-\u1fff])/g, 'σ')
    .replace(/σ(?![\u0370-\u03ff\u1f00-\u1fff])/g, 'ς');
}

function setGreekKeyboard(active) {
  greekKeyboardActive = active;
  const btn = document.getElementById('greekKeyBtn');
  const input = document.getElementById('searchInput');
  btn.classList.toggle('active', greekKeyboardActive);
  btn.setAttribute('aria-pressed', String(greekKeyboardActive));
  input.placeholder = greekKeyboardActive
    ? 'Teclado griego activo: escribe agape, logos, theos...'
    : 'Buscar en griego (ἀγάπη) o español (amor)...';
  if (greekKeyboardActive && input.value) {
    input.value = toGreekKeyboard(input.value);
    query = input.value;
    showAutocomplete();
    search();
  }
}

function searchScore(e, q, qNorm) {
  if (!q) return 1;
  const grLow = e.gr.toLowerCase();
  const grNorm = normalize(e.gr);
  const grLoose = looseGreek(e.gr);
  const qLoose = looseGreek(q);
  const tr = e.tr.toLowerCase();
  const es = normalize(e.es);
  const cod = e.cod.toLowerCase();
  if (grLow === q || grNorm === qNorm || tr === q) return 100;
  if (grLow.startsWith(q) || grNorm.startsWith(qNorm) || tr.startsWith(q)) return 80;
  if (qLoose && grLoose.startsWith(qLoose)) return 70;
  if (es.startsWith(qNorm)) return 65;
  if (grLow.includes(q) || grNorm.includes(qNorm) || tr.includes(q)) return 50;
  if (qLoose && grLoose.includes(qLoose)) return 45;
  if (es.includes(qNorm)) return 35;
  if (cod.includes(q)) return 20;
  const tokens = qNorm.split(/\s+/).filter(Boolean);
  if (tokens.length && tokens.every(t => `${grNorm} ${tr} ${es} ${cod}`.includes(t))) return 15;
  return 0;
}

function sortEntries(items, scored = null) {
  const arr = [...items];
  if (scored) arr.sort((a, b) => (scored.get(b.id) || 0) - (scored.get(a.id) || 0) || a.gr.localeCompare(b.gr, 'el'));
  else if (sortMode === 'category') arr.sort((a, b) => getCat(a.cod).localeCompare(getCat(b.cod)) || a.gr.localeCompare(b.gr, 'el'));
  else if (sortMode === 'known') arr.sort((a, b) => Number(isKnown(b)) - Number(isKnown(a)) || a.gr.localeCompare(b.gr, 'el'));
  else if (sortMode === 'review') arr.sort((a, b) => (entryState(b).bad || 0) - (entryState(a).bad || 0) || Number(isKnown(a)) - Number(isKnown(b)));
  else if (sortMode === 'random') arr.sort(() => Math.random() - 0.5);
  else arr.sort((a, b) => a.gr.localeCompare(b.gr, 'el'));
  return arr;
}

// ── Búsqueda y filtro ─────────────────────────────────────────
function search() {
  const q = query.trim().toLowerCase();
  const qNorm = normalize(q);
  const scored = new Map();

  filtered = DICCIONARIO.filter(e => {
    if (activeCat !== 'ALL' && getCat(e.cod) !== activeCat) return false;
    if (activeLetter !== 'ALL' && e.letra !== activeLetter) return false;
    if (onlyFav && !isFav(e)) return false;
    if (onlyPending && isKnown(e)) return false;
    const score = searchScore(e, q, qNorm);
    if (q && !score) return false;
    scored.set(e.id, score);
    return true;
  });

  filtered = sortEntries(filtered, q ? scored : null);
  document.getElementById('countShown').textContent = filtered.length;
  updatePowerStats();

  if (currentMode === 'lista') renderLista();
  else startFlash();
}

// ── Render lista ──────────────────────────────────────────────
function renderLista() {
  const list = document.getElementById('resultsList');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="emoji">🔍</div>
      <h3>Sin resultados</h3>
      <p>Prueba otra búsqueda, letra o filtro de estudio</p>
    </div>`;
    return;
  }

  let out = '';
  let lastLetra = null;

  filtered.forEach(e => {
    const cat = getCat(e.cod);
    const state = entryState(e);
    if (e.letra !== lastLetra && !query && sortMode !== 'random') {
      const count = filtered.filter(x => x.letra === e.letra).length;
      out += `<div class="letra-sep">
        <span>${esc(e.letra)}</span>
        <hr/>
        <small>${count} entrada${count !== 1 ? 's' : ''}</small>
      </div>`;
      lastLetra = e.letra;
    }
    out += `<div class="cat-${cat}">
      <div class="entry-card ${state.known ? 'known' : ''}" onclick="openModal(${e.id})">
        <div class="card-header">
          <div class="card-greek">${esc(e.gr)}</div>
          <span class="card-badge" style="${badgeStyle(cat)}">${catLabel(cat)}</span>
        </div>
        <div class="card-translit">${esc(e.tr)}</div>
        <div class="card-morpho">${esc(e.cod)}</div>
        <div class="card-meaning">${esc(e.es)}</div>
        <div class="score-note">${state.good || 0} aciertos · ${state.bad || 0} repasos</div>
        <div class="card-actions">
          <button class="mini-action ${state.fav ? 'active' : ''}" title="Favorita" onclick="event.stopPropagation();toggleFavorite(${e.id})">${state.fav ? '★' : '☆'}</button>
          <button class="mini-action ${state.known ? 'active' : ''}" title="Aprendida" onclick="event.stopPropagation();toggleKnown(${e.id})">✓</button>
        </div>
      </div>
    </div>`;
  });

  list.innerHTML = out;
}

// ── Autocomplete ──────────────────────────────────────────────
let acIdx = -1;
let acVisible = false;

function showAutocomplete() {
  const q = query.trim().toLowerCase();
  const qNorm = normalize(q);
  const ac = document.getElementById('autocomplete');

  if (!q || q.length < 1) { ac.className = ''; return; }

  const hits = DICCIONARIO.filter(e => {
    if (activeCat !== 'ALL' && getCat(e.cod) !== activeCat) return false;
    return e.gr.toLowerCase().startsWith(q) ||
           normalize(e.gr).startsWith(qNorm) ||
           looseGreek(e.gr).startsWith(looseGreek(q)) ||
           e.tr.toLowerCase().startsWith(q) ||
           normalize(e.es).startsWith(qNorm);
  }).slice(0, 8);

  if (!hits.length) { ac.className = ''; return; }

  ac.className = 'open';
  acVisible = true;
  acIdx = -1;

  ac.innerHTML = hits.map((e, i) => {
    const cat = getCat(e.cod);
    return `<div class="ac-item" data-idx="${i}" onmousedown="selectAC(event, ${DICCIONARIO.indexOf(e)})">
      <span class="ac-greek">${highlight(e.gr, q)}</span>
      <span class="ac-translit">${e.tr}</span>
      <span class="ac-es">${highlight(e.es, qNorm, true)}</span>
      <span class="ac-badge" style="${badgeStyle(cat)}">${catLabel(cat)}</span>
    </div>`;
  }).join('');
}

function highlight(text, q, norm = false) {
  if (!q) return esc(text);
  const src = norm ? normalize(text) : text.toLowerCase();
  const idx = src.indexOf(q);
  if (idx < 0) return esc(text);
  return esc(text.slice(0, idx)) +
    `<b style="color:var(--azul-lt)">${esc(text.slice(idx, idx + q.length))}</b>` +
    esc(text.slice(idx + q.length));
}

function selectAC(ev, id) {
  ev.preventDefault();
  const entry = DICCIONARIO[id] || DICCIONARIO.find(e => !e.id && id === 0);
  openModal(id);
  document.getElementById('autocomplete').className = '';
  acVisible = false;
}

function hideAC() {
  setTimeout(() => {
    document.getElementById('autocomplete').className = '';
    acVisible = false;
  }, 150);
}

// ── Navegación teclado en autocomplete ───────────────────────
document.getElementById('searchInput').addEventListener('keydown', e => {
  const ac = document.getElementById('autocomplete');
  const items = ac.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acIdx = Math.min(acIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('selected', i === acIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acIdx = Math.max(acIdx - 1, -1);
    items.forEach((el, i) => el.classList.toggle('selected', i === acIdx));
  } else if (e.key === 'Enter' && acIdx >= 0) {
    items[acIdx]?.dispatchEvent(new MouseEvent('mousedown'));
  } else if (e.key === 'Escape') {
    ac.className = '';
  }
});

// ── Input handler ─────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  if (greekKeyboardActive) {
    const before = e.target.value;
    const after = toGreekKeyboard(before);
    if (before !== after) e.target.value = after;
  }
  query = e.target.value;
  document.getElementById('clearBtn').className = query ? 'clear-btn visible' : 'clear-btn';
  showAutocomplete();
  search();
});
document.getElementById('searchInput').addEventListener('blur', hideAC);
document.getElementById('greekKeyBtn').addEventListener('click', () => {
  setGreekKeyboard(!greekKeyboardActive);
  document.getElementById('searchInput').focus();
});
document.getElementById('clearBtn').addEventListener('click', () => {
  query = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').className = 'clear-btn';
  document.getElementById('autocomplete').className = '';
  search();
  document.getElementById('searchInput').focus();
});

// ── Tabs ──────────────────────────────────────────────────────
document.getElementById('tabsWrap').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  search();
});

// ── Modos ─────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btnLista').className = 'mode-btn' + (mode === 'lista' ? ' active' : '');
  document.getElementById('btnFlash').className = 'mode-btn' + (mode === 'flash' ? ' active' : '');
  document.getElementById('resultsList').className = mode === 'flash' ? 'hidden' : '';
  document.getElementById('flashcard-wrap').className = mode === 'flash' ? 'active' : '';
  if (mode === 'flash') startFlash();
}

// ── Flashcards ────────────────────────────────────────────────
function startFlash() {
  fcDeck = [...filtered].sort((a, b) => {
    const sa = entryState(a), sb = entryState(b);
    return Number(sa.known) - Number(sb.known) || (sb.bad || 0) - (sa.bad || 0) || Math.random() - 0.5;
  });
  fcIdx = 0;
  fcOkCount = 0;
  fcFailCount = 0;
  fcFlipped = false;
  updateFcStats();
  showCard();
}

function showCard() {
  if (!fcDeck.length) {
    document.getElementById('flashcard').innerHTML = `<div style="text-align:center;padding:20px">
      <div style="font-size:36px;margin-bottom:12px">🎉</div>
      <div style="font-size:18px;color:var(--verde);font-weight:700">¡Mazo completado!</div>
      <div style="font-size:13px;color:var(--gris);margin-top:8px">Aprendidas: ${fcOkCount} · Repasar: ${fcFailCount}</div>
      <button class="fc-btn primary" onclick="startFlash()" style="margin-top:16px">↺ Repetir</button>
    </div>`;
    return;
  }

  const card = fcDeck[fcIdx];
  fcFlipped = false;
  const fc = document.getElementById('flashcard');
  fc.classList.remove('flipped');
  fc.onclick = flipCard;

  document.getElementById('fcGreek').textContent   = card.gr;
  document.getElementById('fcTranslit').textContent = card.tr;
  document.getElementById('fcCod').textContent      = card.cod;
  document.getElementById('fcMeaning').textContent  = card.es;
  document.getElementById('fcCodBack').textContent  = card.cod;
  document.getElementById('fcLetra').textContent    = card.letra;

  const pct = Math.round((fcIdx / fcDeck.length) * 100);
  document.getElementById('fcBar').style.width = pct + '%';
  document.getElementById('fcLabel').textContent = `Carta ${fcIdx + 1} de ${fcDeck.length}`;
}

function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', fcFlipped);
}

function fcAnswer(correct) {
  if (!fcFlipped) { flipCard(); return; }
  const card = fcDeck[fcIdx];
  const state = entryState(card);
  if (correct) {
    fcOkCount++;
    mutateEntry(card.id, { good: (state.good || 0) + 1, known: true });
  } else {
    fcFailCount++;
    mutateEntry(card.id, { bad: (state.bad || 0) + 1, known: false });
    fcDeck.push(card);
  }
  fcIdx++;
  showCard();
  updateFcStats();
  updatePowerStats();
}

function updateFcStats() {
  document.getElementById('fcOk').textContent   = fcOkCount;
  document.getElementById('fcFail').textContent = fcFailCount;
  document.getElementById('fcPend').textContent = Math.max(0, (fcDeck.length || filtered.length) - fcIdx);
}

// ── Modal detalle ─────────────────────────────────────────────
function openModal(id) {
  const e = DICCIONARIO[id];
  if (!e) return;
  lastModalId = id;
  const cat = getCat(e.cod);

  const colorMap = {
    VB:'#6ee7b7', MSN:'#6ba4f0', FSN:'#c4b5fd',
    NSN:'#fcd34d', ADJ:'#5eead4', PREP:'#5eead4',
    PRON:'#f9a8d4', OTRO:'#8892a4'
  };

  document.getElementById('modalGreek').textContent = e.gr;
  document.getElementById('modalGreek').style.color = colorMap[cat] || '#e8eaf0';
  document.getElementById('modalTranslit').textContent = e.tr;

  // Parsear código morfológico
  let morfoRows = '';
  const codParts = e.cod.split(' - ');
  const catFull = { VB:'Verbo', MSN:'Sust. Masculino', FSN:'Sust. Femenino',
    NSN:'Sust. Neutro', ADJ:'Adjetivo', ADV:'Adverbio', PRON:'Pronombre',
    CONJ:'Conjunción', PREP:'Preposición', PART:'Partícula', NUM:'Numeral',
    ART:'Artículo', INTERJ:'Interjección' };
  const catName = catFull[codParts[0]?.trim()] || codParts[0] || '—';
  const extra = codParts[1] || '';

  morfoRows = `
    <div class="modal-row">
      <div class="modal-label">Significado</div>
      <div class="modal-value meaning-val">${esc(e.es)}</div>
    </div>
    <div class="modal-row">
      <div class="modal-label">Griego</div>
      <div class="modal-value greek-val">${esc(e.gr)}</div>
    </div>
    <div class="modal-row">
      <div class="modal-label">Translit.</div>
      <div class="modal-value">${esc(e.tr)}</div>
    </div>
    <div class="modal-row">
      <div class="modal-label">Categoría</div>
      <div class="modal-value">
        <span style="display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;${badgeStyle(cat)}">${catLabel(cat)}</span>
        <span style="color:var(--gris);font-size:12px;margin-left:8px">${catName}</span>
      </div>
    </div>`;

  if (extra) {
    morfoRows += `<div class="modal-row">
      <div class="modal-label">Morfología</div>
      <div class="modal-value" style="font-family:var(--greek-font);color:var(--azul-lt)">${esc(extra)}</div>
    </div>`;
  }

  if (e.caso) {
    morfoRows += `<div class="modal-row">
      <div class="modal-label">Caso(s)</div>
      <div class="modal-value">${esc(e.caso)}</div>
    </div>`;
  }

  morfoRows += `<div class="modal-row">
    <div class="modal-label">Letra</div>
    <div class="modal-value" style="font-family:var(--greek-font);font-size:16px">${esc(e.letra)}</div>
  </div>`;

  document.getElementById('modalBody').innerHTML = morfoRows;
  updateModalActions();
  document.getElementById('modalOverlay').className = 'modal-overlay open';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').className = 'modal-overlay';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});


function buildLetters() {
  const letters = ['ALL', ...new Set(DICCIONARIO.map(e => e.letra))];
  document.getElementById('letterRow').innerHTML = letters.map(l =>
    `<button class="letter-chip ${activeLetter === l ? 'active' : ''}" data-letter="${esc(l)}" title="${l === 'ALL' ? 'Todas' : 'Letra ' + l}">${l === 'ALL' ? '•' : esc(l)}</button>`
  ).join('');
}

function updatePowerStats() {
  const total = DICCIONARIO.length;
  const known = DICCIONARIO.filter(isKnown).length;
  const favs = DICCIONARIO.filter(isFav).length;
  document.getElementById('statsText').innerHTML =
    `Mostrando <b id="countShown">${filtered.length}</b> de ${total} entradas · <b>${known}</b> aprendidas · <b>${favs}</b> favoritas`;
  document.getElementById('favToggle').classList.toggle('active', onlyFav);
  document.getElementById('pendingToggle').classList.toggle('active', onlyPending);
}

function refreshAll() {
  buildLetters();
  search();
  if (lastModalId !== null && document.getElementById('modalOverlay').classList.contains('open')) updateModalActions();
}

function toggleFavorite(id) {
  const e = DICCIONARIO[id]; if (!e) return;
  mutateEntry(id, { fav: !isFav(e) });
  refreshAll();
}

function toggleKnown(id) {
  const e = DICCIONARIO[id]; if (!e) return;
  mutateEntry(id, { known: !isKnown(e) });
  refreshAll();
}

function updateModalActions() {
  const e = DICCIONARIO[lastModalId]; if (!e) return;
  const fav = document.getElementById('modalFavBtn');
  const known = document.getElementById('modalKnownBtn');
  fav.textContent = isFav(e) ? '★ Favorita' : '☆ Favorita';
  known.textContent = isKnown(e) ? '✓ Aprendida' : '✓ Aprendida';
  fav.classList.toggle('active', isFav(e));
  known.classList.toggle('active', isKnown(e));
}

async function copyLemma(id) {
  const e = DICCIONARIO[id]; if (!e) return;
  const text = `${e.gr} · ${e.tr} · ${e.es} · ${e.cod}`;
  try { await navigator.clipboard.writeText(text); }
  catch {
    const tmp = document.createElement('textarea');
    tmp.value = text; document.body.appendChild(tmp); tmp.select();
    document.execCommand('copy'); tmp.remove();
  }
}

function exportStudy() {
  const payload = {
    exportedAt: new Date().toISOString(),
    learned: DICCIONARIO.filter(isKnown).map(e => ({ gr:e.gr, tr:e.tr, es:e.es, cod:e.cod })),
    favorites: DICCIONARIO.filter(isFav).map(e => ({ gr:e.gr, tr:e.tr, es:e.es, cod:e.cod })),
    raw: studyState
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'progreso-diccionario-koine.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function resetProgress() {
  if (!confirm('¿Reiniciar favoritas, aprendidas y estadísticas?')) return;
  studyState = {};
  saveProgress();
  refreshAll();
}

document.getElementById('sortSelect').addEventListener('change', e => {
  sortMode = e.target.value;
  search();
});
document.getElementById('favToggle').addEventListener('click', () => {
  onlyFav = !onlyFav;
  search();
});
document.getElementById('pendingToggle').addEventListener('click', () => {
  onlyPending = !onlyPending;
  search();
});
document.getElementById('studyNowBtn').addEventListener('click', () => setMode('flash'));
document.getElementById('exportBtn').addEventListener('click', exportStudy);
document.getElementById('resetBtn').addEventListener('click', resetProgress);
document.getElementById('letterRow').addEventListener('click', e => {
  const btn = e.target.closest('.letter-chip'); if (!btn) return;
  activeLetter = btn.dataset.letter;
  buildLetters();
  search();
});
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'g') {
    e.preventDefault();
    setGreekKeyboard(!greekKeyboardActive);
    document.getElementById('searchInput').focus();
  }
  if (currentMode === 'flash' && e.key === ' ') {
    e.preventDefault();
    flipCard();
  }
});

// ── Init ──────────────────────────────────────────────────────
// Asignar IDs correctos al array (por si las dudas)
DICCIONARIO.forEach((e, i) => { if (e.id === undefined) e.id = i; });

initTheme();
buildLetters();
search();
</script>
