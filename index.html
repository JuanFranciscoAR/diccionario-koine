<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <title>Acceso | Diccionario Griego Koine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #10131b;
      --panel: #1b2030;
      --panel2: #242a3b;
      --line: #35405c;
      --text: #e9edf8;
      --muted: #9aa4b8;
      --blue: #67a3ff;
      --green: #4ade80;
      --red: #fb7185;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --greek: "Palatino Linotype", "Book Antiqua", Palatino, "Times New Roman", serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 30% 0%, rgba(103,163,255,0.16), transparent 32rem),
        linear-gradient(135deg, #12172a, #10131b 48%, #101813);
      color: var(--text);
      font-family: var(--font);
    }
    main {
      width: min(92vw, 430px);
      background: rgba(27,32,48,0.9);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
    }
    .mark {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      border: 1px solid rgba(103,163,255,0.42);
      background: rgba(103,163,255,0.12);
      color: #9fc2ff;
      font: 700 38px var(--greek);
      margin-bottom: 18px;
    }
    h1 { margin: 0; font-size: 24px; line-height: 1.18; }
    p { margin: 8px 0 22px; color: var(--muted); line-height: 1.5; }
    label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 13px; font-weight: 700; }
    .field { display: flex; gap: 8px; }
    input {
      min-width: 0;
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--panel2);
      color: var(--text);
      padding: 12px 13px;
      font-size: 15px;
      outline: none;
    }
    input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(103,163,255,0.14); }
    button {
      border: 1px solid #4e8ee8;
      border-radius: 9px;
      background: #4e8ee8;
      color: white;
      padding: 0 16px;
      font-weight: 800;
      cursor: pointer;
    }
    button:disabled { cursor: wait; opacity: 0.7; }
    .status { min-height: 22px; margin-top: 14px; color: var(--muted); font-size: 13px; }
    .status.error { color: var(--red); }
    .status.ok { color: var(--green); }
    .small { margin-top: 18px; font-size: 12px; color: #768198; }
  </style>
</head>
<body>
  <main>
    <div class="mark">α</div>
    <h1>Diccionario Griego Koine</h1>
    <p>Contenido cifrado. Ingresa la clave para cargar la aplicación.</p>
    <form id="unlockForm">
      <label for="passphrase">Clave de acceso</label>
      <div class="field">
        <input id="passphrase" type="password" autocomplete="current-password" autofocus required>
        <button id="unlockBtn" type="submit">Entrar</button>
      </div>
      <div class="status" id="status"></div>
    </form>
    <div class="small">Esta página no indexa el contenido y el diccionario no está publicado en texto plano.</div>
  </main>
  <script>
    const form = document.getElementById('unlockForm');
    const input = document.getElementById('passphrase');
    const button = document.getElementById('unlockBtn');
    const statusEl = document.getElementById('status');

    function fromBase64(value) {
      const raw = atob(value);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
      return bytes;
    }

    async function deriveKey(password, salt, iterations) {
      const baseKey = await crypto.subtle.importKey(
        'raw',
        new TextEncoder().encode(password),
        'PBKDF2',
        false,
        ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
        baseKey,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
    }

    async function fetchText(path) {
      return fetch(path, { cache: 'no-store' }).then(r => {
        if (!r.ok) throw new Error('No se pudo cargar el paquete cifrado.');
        return r.text();
      });
    }

    async function loadPayload() {
      const manifest = await fetch('payload.manifest.json', { cache: 'no-store' }).then(r => {
        if (!r.ok) throw new Error('No se pudo cargar el paquete cifrado.');
        return r.json();
      });
      const chunks = await Promise.all(manifest.chunks.map(fetchText));
      return { ...manifest, ciphertext: chunks.join('') };
    }

    async function unlock(password) {
      const payload = await loadPayload();
      const key = await deriveKey(password, fromBase64(payload.salt), payload.iterations);
      const encrypted = fromBase64(payload.ciphertext);
      const plain = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: fromBase64(payload.iv) },
        key,
        encrypted
      );
      return new TextDecoder().decode(plain);
    }

    form.addEventListener('submit', async event => {
      event.preventDefault();
      statusEl.className = 'status';
      statusEl.textContent = 'Descifrando...';
      button.disabled = true;
      try {
        const html = await unlock(input.value);
        statusEl.className = 'status ok';
        statusEl.textContent = 'Clave correcta. Cargando...';
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        statusEl.className = 'status error';
        statusEl.textContent = 'Clave incorrecta o paquete dañado.';
        button.disabled = false;
        input.select();
      }
    });
  </script>
</body>
</html>
